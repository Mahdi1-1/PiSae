spring.application.name=user-pi-test

# Use in-memory H2 Database for tests (excluding 'USER' from reserved keywords)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Eureka for tests to avoid registration attempts/errors
eureka.client.enabled=false

# Stub OAuth2 Client configs to satisfy Spring Boot configuration validation
spring.security.oauth2.client.registration.google.client-id=mock-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

# Stub Mail configs
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=mock@example.com
spring.mail.password=mock
management.health.mail.enabled=false

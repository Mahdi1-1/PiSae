# --- Secret : identifiants sensibles ---
# ATTENTION : ceci est un exemple en clair pour le TP.
# En conditions réelles, ne jamais committer un Secret en clair dans Git :
# utiliser kubectl create secret, ou un coffre-fort (Vault, Sealed Secrets, SOPS...).
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: pisae
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "rootpassword"
  # "user_db" correspond au nom réel utilisé par userPI en local
  # (voir userPI/src/main/resources/application.properties)
  MYSQL_DATABASE: "user_db"
  MYSQL_USER: "userpi"
  MYSQL_PASSWORD: "userpi_password"
---
# --- ConfigMap : config non sensible ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: pisae
data:
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"
---
# --- Déploiement MySQL ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: pisae
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.1
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: pisae
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: pisae
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None  # headless, un seul pod MySQL pour ce TP

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pisae
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: pisae
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'pisae Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: pisae
data:
  pisae-overview.json: |
    {
      "title": "pisae - Vue d'ensemble backend",
      "uid": "pisae-overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Memoire JVM utilisee (heap)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum(jvm_memory_used_bytes{area=\"heap\"}) by (service)", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 2,
          "title": "Requetes HTTP / seconde",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "sum(rate(http_server_requests_seconds_count[1m])) by (service)", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 3,
          "title": "CPU process",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "process_cpu_usage", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 4,
          "title": "Uptime des services (secondes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "process_uptime_seconds", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 5,
          "title": "Services UP",
          "type": "stat",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 16 },
          "targets": [
            { "expr": "up{job=~\"eureka-server|api-gateway|userpi\"}", "legendFormat": "{{job}}" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: pisae
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /etc/grafana/provisioning/dashboards/pisae-overview.json
              subPath: pisae-overview.json
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
        - name: storage
          emptyDir: {}   # remplace par un PVC pour garder tes dashboards persos entre redéploiements
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: pisae
type: Opaque
stringData:
  admin-password: "admin123"   # à changer avant toute vraie utilisation
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: pisae
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort   # accès direct simple pour le TP ; passer en Ingress/LoadBalancer si besoin

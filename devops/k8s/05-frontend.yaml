apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: picloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <ton-dockerhub-user>/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: picloud
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: NodePort   # simple pour Minikube ; passer en LoadBalancer sur un vrai cluster
---
# Optionnel : Ingress si un ingress-controller est disponible (ex: minikube addons enable ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: picloud-ingress
  namespace: picloud
spec:
  rules:
    - host: picloud.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8091

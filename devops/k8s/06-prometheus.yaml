apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pisae
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'eureka-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['eureka-server:8761']
            labels:
              service: 'eureka-server'

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8091']
            labels:
              service: 'api-gateway'

      - job_name: 'userpi'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['userpi:8081']
            labels:
              service: 'userpi'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: pisae
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}   # remplace par un PVC si tu veux garder l'historique entre redéploiements
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: pisae
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP

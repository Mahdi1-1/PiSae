<div class="auth-page">
  <div class="auth-left">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">PIcloud</span>
    </div>
    <div class="auth-left-content">
      <div class="left-tag">Sécurité du compte</div>
      <h2 class="left-title">Réinitialisez votre mot de passe en toute sécurité</h2>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Mot de passe oublié</h1>
        <p>Entrez votre e-mail pour recevoir un lien de réinitialisation</p>
      </div>

      <div class="success-box" *ngIf="successMessage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" class="form-input"
            [class.input-error]="email?.invalid && email?.touched"
            placeholder="vous@example.com"
            formControlName="email"/>
          <span class="field-error" *ngIf="email?.invalid && email?.touched">
            Adresse e-mail invalide
          </span>
        </div>

        <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading">
          <span *ngIf="!isLoading">Envoyer le lien</span>
          <span *ngIf="isLoading" class="btn-loading">
            <span class="spinner"></span> Envoi...
          </span>
        </button>

        <p class="auth-redirect">
          <a routerLink="/auth/login" class="link-accent">← Retour à la connexion</a>
        </p>
      </form>
    </div>
  </div>
</div>

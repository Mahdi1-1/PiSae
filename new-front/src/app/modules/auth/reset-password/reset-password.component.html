<div class="auth-page">
  <div class="auth-left">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">PIcloud</span>
    </div>
    <div class="auth-left-content">
      <div class="left-tag">Sécurité du compte</div>
      <h2 class="left-title">Choisissez un nouveau mot de passe sécurisé</h2>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Nouveau mot de passe</h1>
        <p>Entrez et confirmez votre nouveau mot de passe</p>
      </div>

      <div class="success-box" *ngIf="successMessage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ successMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <input type="password" class="form-input"
            [class.input-error]="newPassword?.invalid && newPassword?.touched"
            placeholder="Minimum 6 caractères"
            formControlName="newPassword"/>
          <span class="field-error" *ngIf="newPassword?.invalid && newPassword?.touched">
            Minimum 6 caractères
          </span>
        </div>

        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input type="password" class="form-input"
            [class.input-error]="form.hasError('passwordMismatch') && confirmPassword?.touched"
            placeholder="Répétez votre mot de passe"
            formControlName="confirmPassword"/>
          <span class="field-error" *ngIf="form.hasError('passwordMismatch') && confirmPassword?.touched">
            Les mots de passe ne correspondent pas
          </span>
        </div>

        <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading || !token">
          <span *ngIf="!isLoading">Réinitialiser</span>
          <span *ngIf="isLoading" class="btn-loading">
            <span class="spinner"></span> Réinitialisation...
          </span>
        </button>

        <p class="auth-redirect">
          <a routerLink="/auth/login" class="link-accent">← Retour à la connexion</a>
        </p>
      </form>
    </div>
  </div>
</div>
